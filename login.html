<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AyuKart</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="pages.css">
    <link rel="stylesheet" href="responsive.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="container nav-container">
            <div class="nav-left"><a href="index.html" class="logo">🌿 AyuKart</a></div>
            <div class="nav-center">
                <ul class="nav-links" id="nav-links">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="shop.html" class="nav-link">Shop</a></li>
                    <li><a href="dosha-quiz.html" class="nav-link">Dosha Quiz</a></li>
                    <li><a href="blog.html" class="nav-link">Knowledge</a></li>
                    <li><a href="about.html" class="nav-link">About</a></li>
                    <li><a href="contact.html" class="nav-link">Contact</a></li>
                </ul>
            </div>
            <div class="nav-right">
                <a href="wishlist.html" class="nav-icon"><i class="fas fa-heart"></i><span class="badge" id="wishlist-count">0</span></a>
                <a href="cart.html" class="nav-icon"><i class="fas fa-shopping-cart"></i><span class="badge" id="cart-count">0</span></a>
                <button class="mobile-menu-toggle" id="mobile-menu-toggle"><i class="fas fa-bars"></i></button>
            </div>
        </div>
    </nav>

    <section class="auth-section">
        <div class="container auth-container">
            <div class="auth-box">
                <h2>Welcome Back</h2>
                <form id="login-form">
                    <div class="form-group"><label>Email Address</label><input type="email" required></div>
                    <div class="form-group"><label>Password</label><input type="password" required></div>
                    <div class="forgot-password"><a href="#">Forgot Password?</a></div>
                    <button type="submit" class="btn btn-primary" style="width: 100%;">Login</button>
                </form>
                <div class="auth-divider">or</div>
                <div class="social-login">
                    <button class="social-btn"><i class="fab fa-google"></i> Google</button>
                    <button class="social-btn"><i class="fab fa-facebook"></i> Facebook</button>
                </div>
                <div class="auth-footer">
                    Don't have an account? <a href="signup.html">Sign Up</a>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section"><h3>🌿 AyuKart</h3><p>Ancient Wellness, Modern Living</p></div>
            </div>
            <div class="footer-bottom"><p>&copy; 2024 AyuKart. All rights reserved.</p></div>
        </div>
    </footer>

    <script src="data.js"></script>
    <script src="utils.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            CartManager.showNotification('Login successful!', 'success');
            setTimeout(() => window.location.href = 'profile.html', 1000);
        });
    </script>
</body>
</html>
